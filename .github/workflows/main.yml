name: Recovery Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Environment Setup
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Repo Init & Sync
      run: |
        mkdir ~/twrp && cd ~/twrp
        git config --global user.name "mdlava23-droid"
        git config --global user.email "mdlava23@gmail.com"
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo
        sudo mv ~/repo /usr/local/bin/repo
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle

    - name: Clone Device Tree
      run: |
        git clone --depth=1 https://github.com/mdlava23-droid/twrp_infinix_X688B.git ~/twrp/device/infinix/X688B

    - name: Building Recovery
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_X688B-eng
        make -j$(nproc) recoveryimage

    - name: Upload Recovery
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-Recovery
        path: ~/twrp/out/target/product/X688B/recovery.img
